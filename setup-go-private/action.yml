name: Setup Go Private Modules
description: git credential helper와 .netrc를 설정하여 private Go 모듈 인증을 구성합니다. repo별 토큰을 지원합니다.

inputs:
  token:
    description: "기본 GitHub PAT. 토큰 오버라이드가 없는 repo에 적용됩니다."
    required: false
  repos:
    description: |
      인증할 private repo 목록. 줄 단위.
      형식: org/repo, host/org/repo, 또는 host/org/repo:token
      호스트 생략 시 github.com이 기본값.
    required: true

runs:
  using: node20
  main: dist/setup/index.js
  post: dist/teardown/index.js
